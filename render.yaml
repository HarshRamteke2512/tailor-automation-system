services:
  # 1. Java + Python API (Docker bundle — start.sh runs Python bg + Java fg)
  - type: web
    name: tailor-api
    runtime: docker
    plan: free
    rootDir: .
    envVars:
      - key: PORT
        value: "8089"
      - key: DB_HOST
        fromDatabase:
          name: tailor-postgres-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tailor-postgres-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: tailor-postgres-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: tailor-postgres-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tailor-postgres-db
          property: password


  # 2. Frontend (TanStack Start SSR — Node.js Web Service)
  - type: web
    name: react-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    startCommand: "node prod.mjs"

databases:
  # 3. Managed PostgreSQL Instance
  - name: tailor-postgres-db
    plan: free
    databaseName: tailor_automation_db
    user: tailor_admin