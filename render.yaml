services:
  # 1. Java API Service (Spring Boot via Docker)
  - type: web
    name: java-backend-api
    runtime: docker
    plan: free
    rootDir: backend-java
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: tailor-postgres-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tailor-postgres-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: tailor-postgres-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: tailor-postgres-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tailor-postgres-db
          property: password
      - key: PYTHON_SERVER_URL
        fromService:
          type: web
          name: python-backend-api
          property: host

  # 2. Python API Service (Starter $7/mo Tier)
  - type: web
    name: python-backend-api
    runtime: python
    plan: starter
    rootDir: backend-python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tailor-postgres-db
          property: connectionString
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false

  # 3. Frontend (TanStack Start SSR — Node.js Web Service)
  - type: web
    name: react-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    startCommand: "node .output/server/index.mjs"

databases:
  # 4. Managed PostgreSQL Instance
  - name: tailor-postgres-db
    plan: free
    databaseName: tailor_automation_db
    user: tailor_admin