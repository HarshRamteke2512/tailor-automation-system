services:
  # 1. Java API Service (Spring Boot)
  - type: web
    name: java-backend-api
    runtime: java
    plan: free
    rootDir: backend-java
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/demo-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: DB_USER
        fromDatabase:
          name: tailor-postgres-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tailor-postgres-db
          property: password
      - key: JDBC_DATABASE_URL
        fromDatabase:
          name: tailor-postgres-db
          property: jdbcUrl
      - key: PYTHON_SERVER_URL
        fromService:
          type: web
          name: python-backend-api
          property: host

  # 2. Python API Service (Starter $7/mo Tier)
  - type: web
    name: python-backend-api
    runtime: python
    plan: starter
    rootDir: backend-python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tailor-postgres-db
          property: connectionString
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false

  # 3. Frontend (TanStack Start SSR — Node.js Web Service)
  - type: web
    name: react-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    startCommand: "node .output/server/index.mjs"

databases:
  # 4. Managed PostgreSQL Instance
  - name: tailor-postgres-db
    plan: free
    databaseName: tailor_automation_db
    user: tailor_admin